services:
  - type: web
    name: agency-outreach-bot
    runtime: python
    plan: free
    startCommand: python app.py
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: DB_PATH
        value: /tmp/agency_outreach.db
      - key: SETTINGS_PATH
        value: /tmp/agency_settings.json
